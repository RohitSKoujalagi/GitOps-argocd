apiVersion: apps/v1
kind: Deployment
metadata:
 annotations:
  argocd.argoproj.io/tracking-id: django-app:apps/Deployment:django/django-app-deployment
 name: django-app-deployment
 namespace: django
spec:
 replicas: 4
 selector:
  matchLabels:
   app: django-app
 template:
  metadata:
   labels:
    app: django-app
  spec:
   containers:
    - name: django-app
      image: rohitskoujalagi/django-app:49
      ports:
      - containerPort: 8000
