apiVersion: v1
kind: Service
metadata:
	  annotations:
	    argocd.argoproj.io/tracking-id: django-app:/Service:django/django-app-service
	  name: django-app-service
	  namespace: django
spec:
	  ports:
	    - port: 8000
	      protocol: TCP
	      targetPort: 8000
    selector:
	    app: django-app